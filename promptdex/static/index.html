<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PromptDex</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" data-i18n="eyebrow">Biblioteca local</p>
          <h1>PromptDex</h1>
        </div>
        <div class="dex-light" aria-hidden="true">
          <span></span>
        </div>
      </header>

      <section class="controls" aria-label="Prompt filters">
        <label class="search-box">
          <span data-i18n="searchLabel">Buscar</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Debug agents, landing copy..."
            data-i18n-placeholder="searchPlaceholder"
          />
        </label>

        <label>
          <span data-i18n="categoryLabel">Categoria</span>
          <select id="categoryFilter">
            <option value="" data-i18n="allCategories">Todas</option>
          </select>
        </label>

        <label>
          <span data-i18n="tagLabel">Etiqueta</span>
          <input id="tagFilter" type="search" placeholder="codex" data-i18n-placeholder="tagPlaceholder" />
        </label>

        <label>
          <span data-i18n="sortLabel">Orden</span>
          <select id="sortSelect">
            <option value="created_desc" data-i18n="sortNewest">Nuevos</option>
            <option value="rating_desc">Rating</option>
            <option value="favorite_desc" data-i18n="sortFavorites">Favoritos</option>
            <option value="updated_desc" data-i18n="sortUpdated">Actualizados</option>
            <option value="last_used_desc" data-i18n="sortLastUsed">Usados</option>
          </select>
        </label>

        <button id="languageToggle" class="toggle language" type="button" aria-label="Cambiar idioma">
          EN
        </button>

        <button id="favoriteFilter" class="toggle" type="button" aria-pressed="false">
          <span class="star">&#9733;</span>
          <span data-i18n="favorites">Favoritos</span>
        </button>

        <button id="seedLibrary" class="toggle library" type="button">Biblioteca ES/EN</button>
        <button id="exportBackup" class="toggle" type="button">Export JSON</button>
        <button id="importBackup" class="toggle" type="button">Import JSON</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden />
      </section>

      <section class="workspace">
        <aside class="editor-panel" aria-label="Prompt editor">
          <div class="panel-title">
            <h2 id="formTitle" data-mode="new">Nuevo prompt</h2>
            <button id="resetForm" class="ghost" type="button" data-i18n="clear">Limpiar</button>
          </div>

          <form id="promptForm">
            <input id="promptId" type="hidden" />

            <label>
              <span data-i18n="titleLabel">Titulo</span>
              <input id="titleInput" required maxlength="160" placeholder="Code review lens" />
            </label>

            <label>
              <span data-i18n="categoryLabel">Categoria</span>
              <select id="categoryInput" required></select>
            </label>

            <label>
              <span data-i18n="tagsLabel">Etiquetas</span>
              <input id="tagsInput" placeholder="codex, review, python" />
            </label>

            <label>
              <span>Prompt</span>
              <textarea
                id="bodyInput"
                required
                rows="10"
                placeholder="Pega el prompt que quieres guardar."
                data-i18n-placeholder="bodyPlaceholder"
              ></textarea>
            </label>

            <div class="form-row">
              <fieldset class="rating-field">
                <legend>Rating</legend>
                <div id="ratingInput" class="stars" aria-label="Rating"></div>
              </fieldset>

              <label class="favorite-check">
                <input id="favoriteInput" type="checkbox" />
                <span data-i18n="favorite">Favorito</span>
              </label>
            </div>

            <button class="primary" type="submit" data-i18n="save">Guardar</button>
          </form>
        </aside>

        <section class="list-panel" aria-live="polite">
          <div class="panel-title">
            <h2 data-i18n="cardsTitle">Tarjetas</h2>
            <p id="promptCount">0 prompts</p>
          </div>
          <p class="shortcuts" data-i18n="shortcuts">
            Atajos: Ctrl+S guardar, Ctrl+K buscar, Ctrl+Shift+C copiar primera tarjeta.
          </p>
          <div id="promptList" class="prompt-grid"></div>
          <div id="emptyState" class="empty" hidden>
            <strong data-i18n="emptyTitle">No hay prompts.</strong>
            <span data-i18n="emptyHint">Ajusta filtros o agrega uno nuevo.</span>
          </div>
        </section>
      </section>
    </main>

    <template id="promptCardTemplate">
      <article class="prompt-card">
        <div class="card-head">
          <div>
            <span class="badge"></span>
            <h3></h3>
          </div>
          <button class="icon favorite-button" type="button" aria-label="Toggle favorite">&#9734;</button>
        </div>

        <p class="body-preview"></p>
        <div class="tags"></div>

        <div class="card-meta">
          <div class="card-stars" aria-label="Prompt rating"></div>
          <span class="last-used"></span>
        </div>

        <div class="card-actions">
          <button class="read-button secondary" type="button" aria-expanded="false">Leer</button>
          <button class="copy-button" type="button">Copiar</button>
          <button class="duplicate-button secondary" type="button">Duplicar</button>
          <button class="edit-button secondary" type="button">Editar</button>
          <button class="delete-button danger" type="button">Borrar</button>
        </div>
      </article>
    </template>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
